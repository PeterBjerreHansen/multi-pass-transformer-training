[project]
name = "multipass-transformer-training"
version = "0.1.0"
description = "Research code for multi-pass transformer training on synthetic state-tracking tasks."
requires-python = ">=3.10"
dependencies = [
    "torch>=2.0",
]

[project.optional-dependencies]
test = [
    "pytest>=7",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = ["-p", "no:cacheprovider"]
